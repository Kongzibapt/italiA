<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>italiA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #FFFAF4;
      color: #1a1a1a;
    }

    .header {
      background: #A8D5BA;
      padding: 14px 16px;
    }
    .header-title { font-size: 16px; font-weight: 800; color: white; }
    .header-subtitle { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 1px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    label {
      font-size: 11px; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: block; margin-bottom: 5px;
    }

    input {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: 13px; background: white; color: #1a1a1a;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #A8D5BA; }

    .btn {
      width: 100%; padding: 10px;
      background: #A8D5BA; color: white;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #8fc4a6; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary {
      background: none; color: #999; font-weight: 500; font-size: 12px;
      border: 1.5px solid #e5e7eb; margin-top: -4px;
    }
    .btn.secondary:hover { background: #f5f5f5; }

    .status {
      font-size: 12px; text-align: center; padding: 7px 10px; border-radius: 8px;
    }
    .status.error   { color: #F98258; background: #fff5f0; }
    .status.success { color: #A8D5BA; background: #f0faf4; }
    .status.info    { color: #90CAF9; background: #f0f6ff; }

    .divider { border: none; border-top: 1px solid #eee; }

    /* Vue connectée */
    .connected-info {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #f0faf4;
      border-radius: 10px; border: 1px solid #d4edda;
    }
    .connected-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #A8D5BA; flex-shrink: 0;
    }
    .connected-text { font-size: 12px; color: #555; font-weight: 500; }

    .hint { font-size: 11px; color: #aaa; line-height: 1.5; text-align: center; }

    .link { color: #A8D5BA; cursor: pointer; text-decoration: underline; }

    .detecting {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px 0; color: #aaa; font-size: 12px;
    }
    .spinner {
      width: 14px; height: 14px; border: 2px solid #eee;
      border-top-color: #A8D5BA; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">italiA</div>
    <div class="header-subtitle">Extension vocabulaire</div>
  </div>

  <div class="body">

    <!-- Détection en cours -->
    <div id="view-detecting">
      <div class="detecting">
        <div class="spinner"></div>
        <span>Connexion en cours…</span>
      </div>
    </div>

    <!-- Connecté -->
    <div id="view-connected" style="display:none;">
      <div class="connected-info">
        <div class="connected-dot"></div>
        <span class="connected-text">Connecté à italiA</span>
      </div>
      <p class="hint">
        Sélectionne un mot sur n'importe quelle page,<br>le tooltip apparaît automatiquement.
      </p>
      <hr class="divider" />
      <button class="btn secondary" id="btn-logout">Se déconnecter</button>
    </div>

    <!-- Formulaire de login -->
    <div id="view-login" style="display:none;">
      <div>
        <label>Email</label>
        <input id="input-email" type="email" placeholder="ton@email.com" autocomplete="email" />
      </div>
      <div>
        <label>Mot de passe</label>
        <input id="input-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="btn-login">Se connecter</button>
      <div id="login-status" class="status" style="display:none;"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
